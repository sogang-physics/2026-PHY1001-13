<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마찰에 의한 등속 원운동</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; }
.container { display: flex; height: 100vh; }
.canvas-area { flex: 1; position: relative; }
canvas { width: 100%; height: 100%; display: block; }
.controls { width: 260px; padding: 20px; background: #faf5f6; border-left: 2px solid rgba(139,0,41,0.15); overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
h2 { color: #8B0029; font-size: 1.1rem; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 0.75rem; margin-bottom: 12px; }
label { display: block; font-size: 0.8rem; color: #555; margin-bottom: 2px; }
.slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.slider-row input[type="range"] { flex: 1; accent-color: #8B0029; }
.slider-val { font-size: 0.8rem; font-weight: 600; color: #8B0029; min-width: 50px; text-align: right; }
.info-box { background: white; border: 1px solid rgba(139,0,41,0.15); border-radius: 10px; padding: 12px; font-size: 0.8rem; line-height: 1.6; }
.info-box .val { color: #8B0029; font-weight: 700; }
.btn-row { display: flex; gap: 8px; }
button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: #8B0029; color: white; }
.btn-primary:hover { background: #a3003a; }
.btn-secondary { background: rgba(139,0,41,0.1); color: #8B0029; }
.btn-secondary:hover { background: rgba(139,0,41,0.2); }
.status-ok { color: #2e7d32; font-weight: 700; }
.status-fail { color: #d32f2f; font-weight: 700; }
@media (max-width: 700px) {
  .container { flex-direction: column; }
  .canvas-area { flex: none; height: 55vh; }
  .controls { width: 100%; border-left: none; border-top: 2px solid rgba(139,0,41,0.15); height: 45vh; }
}
</style>
</head>
<body>
<div class="container">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
  </div>
  <div class="controls">
    <div>
      <h2>마찰에 의한 등속 원운동</h2>
      <div class="subtitle">구심력과 마찰력</div>
    </div>

    <div>
      <label>질량 m</label>
      <div class="slider-row">
        <input type="range" id="sl-mass" min="0.5" max="10" step="0.5" value="2.0">
        <span class="slider-val" id="val-mass">2.0 kg</span>
      </div>
    </div>

    <div>
      <label>반지름 R</label>
      <div class="slider-row">
        <input type="range" id="sl-radius" min="1" max="20" step="0.5" value="5.0">
        <span class="slider-val" id="val-radius">5.0 m</span>
      </div>
    </div>

    <div>
      <label>속력 v</label>
      <div class="slider-row">
        <input type="range" id="sl-speed" min="1" max="30" step="0.5" value="5.0">
        <span class="slider-val" id="val-speed">5.0 m/s</span>
      </div>
    </div>

    <div>
      <label>정지마찰계수 &mu;<sub>s</sub></label>
      <div class="slider-row">
        <input type="range" id="sl-mu" min="0.1" max="1.0" step="0.05" value="0.50">
        <span class="slider-val" id="val-mu">0.50</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-start">시작</button>
      <button class="btn-secondary" id="btn-reset">초기화</button>
    </div>

    <div class="info-box" id="info-box">
      구심가속도: <span class="val" id="info-acc">5.00 m/s&sup2;</span><br>
      필요 구심력: <span class="val" id="info-fc">10.00 N</span><br>
      최대 정지마찰력 (μ<sub>s</sub>mg): <span class="val" id="info-fs">9.81 N</span><br>
      상태: <span id="info-status" class="status-ok">원운동 유지</span><br>
      주기: <span class="val" id="info-period">6.28 s</span><br>
      각속도: <span class="val" id="info-omega">1.00 rad/s</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let W, H;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Sliders
const slMass = document.getElementById('sl-mass');
const slRadius = document.getElementById('sl-radius');
const slSpeed = document.getElementById('sl-speed');
const slMu = document.getElementById('sl-mu');
const valMass = document.getElementById('val-mass');
const valRadius = document.getElementById('val-radius');
const valSpeed = document.getElementById('val-speed');
const valMu = document.getElementById('val-mu');

const btnStart = document.getElementById('btn-start');
const btnReset = document.getElementById('btn-reset');

const infoAcc = document.getElementById('info-acc');
const infoFc = document.getElementById('info-fc');
const infoFs = document.getElementById('info-fs');
const infoStatus = document.getElementById('info-status');
const infoPeriod = document.getElementById('info-period');
const infoOmega = document.getElementById('info-omega');

const g = 9.81;

let mass = 2.0, radius = 5.0, speed = 5.0, mu = 0.50;
let running = false;
let theta = 0;
let departed = false;
let departX = 0, departY = 0, departVx = 0, departVy = 0;
let linX = 0, linY = 0;
let trail = [];
let lastTime = null;

function getParams() {
  mass = parseFloat(slMass.value);
  radius = parseFloat(slRadius.value);
  speed = parseFloat(slSpeed.value);
  mu = parseFloat(slMu.value);
}

function updateLabels() {
  valMass.textContent = mass.toFixed(1) + ' kg';
  valRadius.textContent = radius.toFixed(1) + ' m';
  valSpeed.textContent = speed.toFixed(1) + ' m/s';
  valMu.textContent = mu.toFixed(2);
}

function updateInfo() {
  const ac = speed * speed / radius;
  const fc = mass * speed * speed / radius;
  const fsMax = mu * mass * g;
  const T = 2 * Math.PI * radius / speed;
  const omega = speed / radius;

  infoAcc.textContent = ac.toFixed(2) + ' m/s\u00B2';
  infoFc.textContent = fc.toFixed(2) + ' N';
  infoFs.textContent = fsMax.toFixed(2) + ' N';
  infoPeriod.textContent = T.toFixed(2) + ' s';
  infoOmega.textContent = omega.toFixed(2) + ' rad/s';

  if (fc > fsMax) {
    infoStatus.textContent = '\uC774\uD0C8!';
    infoStatus.className = 'status-fail';
  } else {
    infoStatus.textContent = '\uC6D0\uC6B4\uB3D9 \uC720\uC9C0';
    infoStatus.className = 'status-ok';
  }
}

function resetSim() {
  running = false;
  theta = 0;
  departed = false;
  trail = [];
  lastTime = null;
  btnStart.textContent = '시작';
  getParams();
  updateLabels();
  updateInfo();
  draw();
}

// Scale: map physics meters to pixels
function scale() {
  // The circle should fit nicely. Max radius = 20m.
  const maxR = 22;
  const minDim = Math.min(W, H) * 0.38;
  return minDim / maxR;
}

function toCanvas(px, py) {
  const s = scale();
  const cx = W / 2;
  const cy = H / 2 - 20; // shift up a bit for bar space
  return [cx + px * s, cy - py * s];
}

function drawArrow(x0, y0, x1, y1, color, label) {
  const dx = x1 - x0, dy = y1 - y0;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 2) return;
  const angle = Math.atan2(dy, dx);
  const headLen = Math.min(10, len * 0.3);

  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 - headLen * Math.cos(angle - 0.4), y1 - headLen * Math.sin(angle - 0.4));
  ctx.lineTo(x1 - headLen * Math.cos(angle + 0.4), y1 - headLen * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();

  if (label) {
    ctx.font = 'bold 14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const offX = 16 * Math.cos(angle + Math.PI / 2);
    const offY = 16 * Math.sin(angle + Math.PI / 2);
    ctx.fillText(label, (x0 + x1) / 2 + offX, (y0 + y1) / 2 + offY);
  }
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  const s = scale();
  const fc = mass * speed * speed / radius;
  const fsMax = mu * mass * g;
  const isOverLimit = fc > fsMax;

  // Draw circular track
  const [cx, cy] = toCanvas(0, 0);
  const rPx = radius * s;

  ctx.save();
  ctx.setLineDash([8, 6]);
  ctx.lineWidth = 2;
  ctx.strokeStyle = (isOverLimit || departed) ? 'rgba(211,47,47,0.5)' : 'rgba(139,0,41,0.3)';
  ctx.beginPath();
  ctx.arc(cx, cy, rPx, 0, 2 * Math.PI);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Center dot
  ctx.fillStyle = '#ccc';
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, 2 * Math.PI);
  ctx.fill();

  // Object position in physics coords
  let objPx, objPy; // physics coords
  if (!departed) {
    objPx = radius * Math.cos(theta);
    objPy = radius * Math.sin(theta);
  } else {
    objPx = linX;
    objPy = linY;
  }

  // Trail
  if (trail.length > 1) {
    for (let i = 1; i < trail.length; i++) {
      const alpha = i / trail.length * 0.5;
      const [tx0, ty0] = toCanvas(trail[i - 1][0], trail[i - 1][1]);
      const [tx1, ty1] = toCanvas(trail[i][0], trail[i][1]);
      ctx.strokeStyle = `rgba(139,0,41,${alpha})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(tx0, ty0);
      ctx.lineTo(tx1, ty1);
      ctx.stroke();
    }
  }

  // Object
  const [ox, oy] = toCanvas(objPx, objPy);
  ctx.fillStyle = '#8B0029';
  ctx.beginPath();
  ctx.arc(ox, oy, 10, 0, 2 * Math.PI);
  ctx.fill();
  ctx.fillStyle = 'rgba(139,0,41,0.15)';
  ctx.beginPath();
  ctx.arc(ox, oy, 14, 0, 2 * Math.PI);
  ctx.fill();

  // Vectors (only if running or at initial position)
  const arrowScale = s * 0.15;
  if (!departed) {
    // Velocity vector: tangent direction (-sin(theta), cos(theta)) * speed
    const vx = -Math.sin(theta) * speed;
    const vy = Math.cos(theta) * speed;
    const vLen = Math.min(speed * arrowScale, 80);
    const vnorm = Math.sqrt(vx * vx + vy * vy);
    if (vnorm > 0) {
      const [vex, vey] = toCanvas(objPx + vx / vnorm * vLen / s, objPy + vy / vnorm * vLen / s);
      drawArrow(ox, oy, vex, vey, '#d32f2f', 'v');
    }

    // Acceleration vector: toward center = (-cos(theta), -sin(theta)) * v^2/R
    const ac = speed * speed / radius;
    const ax = -Math.cos(theta) * ac;
    const ay = -Math.sin(theta) * ac;
    const aLen = Math.min(ac * arrowScale, 80);
    const anorm = Math.sqrt(ax * ax + ay * ay);
    if (anorm > 0) {
      const [aex, aey] = toCanvas(objPx + ax / anorm * aLen / s, objPy + ay / anorm * aLen / s);
      drawArrow(ox, oy, aex, aey, '#1565c0', 'a');
    }
  } else {
    // Show velocity direction during linear flight
    const vLen = Math.min(speed * arrowScale, 80);
    const vnorm = Math.sqrt(departVx * departVx + departVy * departVy);
    if (vnorm > 0) {
      const [vex, vey] = toCanvas(objPx + departVx / vnorm * vLen / s, objPy + departVy / vnorm * vLen / s);
      drawArrow(ox, oy, vex, vey, '#d32f2f', 'v');
    }
  }

  // Warning indicator when departed
  if (departed) {
    ctx.save();
    ctx.font = 'bold 18px -apple-system, sans-serif';
    ctx.fillStyle = '#d32f2f';
    ctx.textAlign = 'center';
    ctx.fillText('\u26A0 \uC774\uD0C8! \uAD6C\uC2EC\uB825 \uBD80\uC871', W / 2, 36);
    ctx.restore();
  }

  // Force comparison bars at bottom
  drawForceBars(fc, fsMax);
}

function drawForceBars(fc, fsMax) {
  const barY = H - 50;
  const barH = 16;
  const maxBarW = Math.min(W * 0.6, 350);
  const labelX = W / 2 - maxBarW / 2 - 10;

  // Determine max force for scaling
  const maxForce = Math.max(fc, fsMax, 1);
  const barScale = maxBarW / maxForce;

  const barLeft = W / 2 - maxBarW / 2;

  // Labels
  ctx.save();
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';

  // Required centripetal force bar
  ctx.fillStyle = '#555';
  ctx.fillText('\uD544\uC694 \uAD6C\uC2EC\uB825', barLeft - 8, barY - barH / 2 - 2);
  const fcW = Math.max(2, fc * barScale);
  ctx.fillStyle = fc > fsMax ? '#d32f2f' : 'rgba(211,47,47,0.7)';
  ctx.beginPath();
  ctx.roundRect(barLeft, barY - barH - 4, fcW, barH, 4);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  if (fcW > 40) ctx.fillText(fc.toFixed(1) + ' N', barLeft + 6, barY - barH / 2 - 4);

  // Max friction force bar
  ctx.font = '11px -apple-system, sans-serif';
  ctx.fillStyle = '#555';
  ctx.textAlign = 'right';
  ctx.fillText('최대 정지마찰력 (μₛmg)', barLeft - 8, barY + barH / 2 + 6);
  const fsW = Math.max(2, fsMax * barScale);
  ctx.fillStyle = 'rgba(21,101,192,0.7)';
  ctx.beginPath();
  ctx.roundRect(barLeft, barY + 4, fsW, barH, 4);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  if (fsW > 40) ctx.fillText(fsMax.toFixed(1) + ' N', barLeft + 6, barY + barH / 2 + 4);

  ctx.restore();
}

function step(timestamp) {
  if (!running) return;
  if (!lastTime) { lastTime = timestamp; requestAnimationFrame(step); return; }
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  getParams();
  updateLabels();
  updateInfo();

  const fc = mass * speed * speed / radius;
  const fsMax = mu * mass * g;

  if (!departed) {
    // Check departure condition
    if (fc > fsMax) {
      departed = true;
      // Departure point and velocity
      departX = radius * Math.cos(theta);
      departY = radius * Math.sin(theta);
      departVx = -Math.sin(theta) * speed;
      departVy = Math.cos(theta) * speed;
      linX = departX;
      linY = departY;
    } else {
      // Normal circular motion
      const omega = speed / radius;
      theta += omega * dt;
      if (theta > 2 * Math.PI) theta -= 2 * Math.PI;
    }
  }

  if (departed) {
    // Linear motion
    linX += departVx * dt;
    linY += departVy * dt;
  }

  // Update trail
  const px = departed ? linX : radius * Math.cos(theta);
  const py = departed ? linY : radius * Math.sin(theta);
  trail.push([px, py]);
  if (trail.length > 60) trail.shift();

  draw();
  requestAnimationFrame(step);
}

// Slider events — update in real time
[slMass, slRadius, slSpeed, slMu].forEach(sl => {
  sl.addEventListener('input', () => {
    getParams();
    updateLabels();
    updateInfo();
    if (!running) draw();
  });
});

btnStart.addEventListener('click', () => {
  if (running) {
    running = false;
    lastTime = null;
    btnStart.textContent = '시작';
  } else {
    getParams();
    updateLabels();
    updateInfo();
    running = true;
    btnStart.textContent = '일시정지';
    requestAnimationFrame(step);
  }
});

btnReset.addEventListener('click', resetSim);

// Init
resetSim();
</script>
</body>
</html>
