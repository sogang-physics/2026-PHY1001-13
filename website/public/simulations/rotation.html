<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회전 운동 시뮬레이션</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; }

  .container { display: flex; height: 100vh; }

  .canvas-area { flex: 1; position: relative; }
  canvas { width: 100%; height: 100%; display: block; }

  .controls {
    width: 260px; padding: 20px; background: #faf5f6;
    border-left: 2px solid rgba(139,0,41,0.15);
    overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
  }

  h2 { color: #8B0029; font-size: 1.1rem; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 0.75rem; margin-bottom: 12px; }

  label { display: block; font-size: 0.8rem; color: #555; margin-bottom: 2px; }
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .slider-row input[type="range"] { flex: 1; accent-color: #8B0029; }
  .slider-val { font-size: 0.8rem; font-weight: 600; color: #8B0029; min-width: 50px; text-align: right; }

  .info-box {
    background: white; border: 1px solid rgba(139,0,41,0.15);
    border-radius: 10px; padding: 12px; font-size: 0.8rem; line-height: 1.6;
  }
  .info-box .val { color: #8B0029; font-weight: 700; }

  .btn-row { display: flex; gap: 8px; }
  button {
    flex: 1; padding: 8px; border: none; border-radius: 8px;
    font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: #8B0029; color: white; }
  .btn-primary:hover { background: #a3003a; }
  .btn-secondary { background: rgba(139,0,41,0.1); color: #8B0029; }
  .btn-secondary:hover { background: rgba(139,0,41,0.2); }

  select {
    width: 100%; padding: 6px 8px; border: 1px solid rgba(139,0,41,0.2);
    border-radius: 6px; font-size: 0.8rem; background: white; color: #1a1a1a;
  }

  @media (max-width: 700px) {
    .container { flex-direction: column; }
    .canvas-area { height: 55vh; }
    .controls { width: 100%; height: 45vh; border-left: none; border-top: 2px solid rgba(139,0,41,0.15); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
  </div>
  <div class="controls">
    <div>
      <h2>회전 운동</h2>
      <div class="subtitle">토크, 관성 모멘트, 각가속도</div>
    </div>

    <div>
      <label>물체 형태</label>
      <select id="shape">
        <option value="disk">원판 (I = ½MR²)</option>
        <option value="ring">링 (I = MR²)</option>
        <option value="rod">막대 (I = ⅓ML²)</option>
      </select>
    </div>

    <div>
      <label>질량 M</label>
      <div class="slider-row">
        <input type="range" id="mass" min="0.5" max="10" step="0.5" value="2">
        <span class="slider-val" id="mass-val">2.0 kg</span>
      </div>
    </div>

    <div>
      <label>반지름 / 길이 R</label>
      <div class="slider-row">
        <input type="range" id="radius" min="0.1" max="1.0" step="0.05" value="0.5">
        <span class="slider-val" id="radius-val">0.50 m</span>
      </div>
    </div>

    <div>
      <label>가해지는 힘 F</label>
      <div class="slider-row">
        <input type="range" id="force" min="0" max="20" step="0.5" value="5">
        <span class="slider-val" id="force-val">5.0 N</span>
      </div>
    </div>

    <div class="info-box" id="info">
      <!-- dynamically filled -->
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-toggle">시작</button>
      <button class="btn-secondary" id="btn-reset">초기화</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

const massSlider = document.getElementById('mass');
const radiusSlider = document.getElementById('radius');
const forceSlider = document.getElementById('force');
const shapeSelect = document.getElementById('shape');
const info = document.getElementById('info');

let running = false;
let theta = 0;       // angle in rad
let omega = 0;       // angular velocity
let time = 0;
let lastTime = null;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}

function getParams() {
  const M = parseFloat(massSlider.value);
  const R = parseFloat(radiusSlider.value);
  const F = parseFloat(forceSlider.value);
  const shape = shapeSelect.value;

  let I;
  if (shape === 'disk') I = 0.5 * M * R * R;
  else if (shape === 'ring') I = M * R * R;
  else I = (1/3) * M * R * R; // rod pinned at end

  const tau = F * R; // force applied at edge, tangentially
  const alpha = tau / I;

  return { M, R, F, I, tau, alpha, shape };
}

function updateLabels() {
  document.getElementById('mass-val').textContent = parseFloat(massSlider.value).toFixed(1) + ' kg';
  document.getElementById('radius-val').textContent = parseFloat(radiusSlider.value).toFixed(2) + ' m';
  document.getElementById('force-val').textContent = parseFloat(forceSlider.value).toFixed(1) + ' N';
}

function updateInfo() {
  const p = getParams();
  info.innerHTML = `
    <div>관성 모멘트: <span class="val">I = ${p.I.toFixed(3)} kg·m²</span></div>
    <div>토크: <span class="val">τ = ${p.tau.toFixed(2)} N·m</span></div>
    <div>각가속도: <span class="val">α = ${p.alpha.toFixed(2)} rad/s²</span></div>
    <hr style="border:none;border-top:1px solid rgba(139,0,41,0.1);margin:6px 0">
    <div>각속도: <span class="val">ω = ${omega.toFixed(2)} rad/s</span></div>
    <div>각도: <span class="val">θ = ${(theta % (2*Math.PI)).toFixed(2)} rad</span></div>
    <div>회전수: <span class="val">${(theta / (2*Math.PI)).toFixed(1)} rev</span></div>
    <div>운동에너지: <span class="val">K = ${(0.5 * p.I * omega * omega).toFixed(2)} J</span></div>
  `;
}

function drawScene() {
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const p = getParams();
  const cx = w / 2;
  const cy = h / 2;
  const scale = Math.min(w, h) * 0.35; // pixels per meter
  const R_px = p.R * scale;

  ctx.save();
  ctx.translate(cx, cy);

  // Pivot point
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#8B0029';
  ctx.fill();

  ctx.rotate(theta);

  if (p.shape === 'disk') {
    // Disk
    ctx.beginPath();
    ctx.arc(0, 0, R_px, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(139, 0, 41, 0.08)';
    ctx.fill();
    ctx.strokeStyle = '#8B0029';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Radius line
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(R_px, 0);
    ctx.strokeStyle = '#8B0029';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Edge marker
    ctx.beginPath();
    ctx.arc(R_px, 0, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#8B0029';
    ctx.fill();

  } else if (p.shape === 'ring') {
    // Ring (two circles)
    ctx.beginPath();
    ctx.arc(0, 0, R_px, 0, Math.PI * 2);
    ctx.strokeStyle = '#8B0029';
    ctx.lineWidth = 8;
    ctx.stroke();

    // Spoke lines
    for (let i = 0; i < 4; i++) {
      const a = (Math.PI / 2) * i;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(R_px * Math.cos(a), R_px * Math.sin(a));
      ctx.strokeStyle = 'rgba(139,0,41,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Edge marker
    ctx.beginPath();
    ctx.arc(R_px, 0, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#8B0029';
    ctx.fill();

  } else {
    // Rod pinned at one end
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(R_px, 0);
    ctx.strokeStyle = '#8B0029';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.stroke();

    // End marker
    ctx.beginPath();
    ctx.arc(R_px, 0, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#a3003a';
    ctx.fill();
  }

  // Force arrow at edge (tangential)
  if (p.F > 0) {
    const arrowLen = Math.min(p.F * 3, 60);
    // Arrow perpendicular to radius at the edge point
    ctx.save();
    ctx.translate(R_px, 0);
    ctx.rotate(Math.PI / 2); // tangential direction

    // Arrow line
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -arrowLen);
    ctx.strokeStyle = '#e63946';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Arrowhead
    ctx.beginPath();
    ctx.moveTo(0, -arrowLen);
    ctx.lineTo(-5, -arrowLen + 10);
    ctx.lineTo(5, -arrowLen + 10);
    ctx.closePath();
    ctx.fillStyle = '#e63946';
    ctx.fill();

    // Label
    ctx.rotate(-Math.PI / 2 - theta); // un-rotate for text
    ctx.fillStyle = '#e63946';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('F', 0, -arrowLen - 8);
    ctx.restore();
  }

  ctx.restore();

  // Angular velocity arc arrow (top-left)
  if (Math.abs(omega) > 0.01) {
    ctx.save();
    ctx.translate(cx, cy);
    const arcR = R_px + 25;
    const arcSpan = Math.min(Math.abs(omega) * 0.3, 1.5);
    const dir = omega > 0 ? 1 : -1;

    ctx.beginPath();
    ctx.arc(0, 0, arcR, -arcSpan, arcSpan);
    ctx.strokeStyle = 'rgba(139,0,41,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Arrowhead at end of arc
    const endAngle = arcSpan;
    const ax = arcR * Math.cos(endAngle);
    const ay = arcR * Math.sin(endAngle);
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(endAngle + Math.PI / 2);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-4, 8);
    ctx.lineTo(4, 8);
    ctx.closePath();
    ctx.fillStyle = 'rgba(139,0,41,0.4)';
    ctx.fill();
    ctx.restore();

    // ω label
    ctx.fillStyle = '#8B0029';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`ω = ${omega.toFixed(1)} rad/s`, 0, -arcR - 10);
    ctx.restore();
  }

  // Title
  ctx.fillStyle = '#8B0029';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('τ = I·α', 12, 24);
}

function step(timestamp) {
  if (!running) return;
  if (lastTime === null) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  const p = getParams();
  omega += p.alpha * dt;
  theta += omega * dt;
  time += dt;

  drawScene();
  updateInfo();
  requestAnimationFrame(step);
}

// Events
massSlider.addEventListener('input', () => { updateLabels(); updateInfo(); drawScene(); });
radiusSlider.addEventListener('input', () => { updateLabels(); updateInfo(); drawScene(); });
forceSlider.addEventListener('input', () => { updateLabels(); updateInfo(); drawScene(); });
shapeSelect.addEventListener('change', () => { updateInfo(); drawScene(); });

document.getElementById('btn-toggle').addEventListener('click', () => {
  running = !running;
  document.getElementById('btn-toggle').textContent = running ? '정지' : '시작';
  if (running) {
    lastTime = null;
    requestAnimationFrame(step);
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  running = false;
  theta = 0;
  omega = 0;
  time = 0;
  lastTime = null;
  document.getElementById('btn-toggle').textContent = '시작';
  updateInfo();
  drawScene();
});

window.addEventListener('resize', () => { resize(); drawScene(); });

// Init
resize();
updateLabels();
updateInfo();
drawScene();
</script>
</body>
</html>
