<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마찰력 시뮬레이션</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; }

  .container { display: flex; height: 100vh; }

  .canvas-area { flex: 1; position: relative; }
  canvas { width: 100%; height: 100%; display: block; }

  .controls {
    width: 260px; padding: 20px; background: #faf5f6;
    border-left: 2px solid rgba(139,0,41,0.15);
    overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
  }

  h2 { color: #8B0029; font-size: 1.1rem; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 0.75rem; margin-bottom: 12px; }

  label { display: block; font-size: 0.8rem; color: #555; margin-bottom: 2px; }
  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .slider-row input[type="range"] { flex: 1; accent-color: #8B0029; }
  .slider-val { font-size: 0.8rem; font-weight: 600; color: #8B0029; min-width: 50px; text-align: right; }

  .info-box {
    background: white; border: 1px solid rgba(139,0,41,0.15);
    border-radius: 10px; padding: 12px; font-size: 0.8rem; line-height: 1.6;
  }
  .info-box .val { color: #8B0029; font-weight: 700; }

  .btn-row { display: flex; gap: 8px; }
  button {
    flex: 1; padding: 8px; border: none; border-radius: 8px;
    font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary { background: #8B0029; color: white; }
  .btn-primary:hover { background: #a3003a; }
  .btn-secondary { background: rgba(139,0,41,0.1); color: #8B0029; }
  .btn-secondary:hover { background: rgba(139,0,41,0.2); }

  @media (max-width: 700px) {
    .container { flex-direction: column; }
    .canvas-area { height: 55vh; }
    .controls { width: 100%; height: 45vh; border-left: none; border-top: 2px solid rgba(139,0,41,0.15); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
  </div>
  <div class="controls">
    <div>
      <h2>마찰력 시뮬레이션</h2>
      <div class="subtitle">정지마찰력과 운동마찰력</div>
    </div>

    <div>
      <label>질량 m</label>
      <div class="slider-row">
        <input type="range" id="mass" min="1" max="20" step="0.5" value="5">
        <span class="slider-val" id="mass-val">5.0 kg</span>
      </div>
    </div>

    <div>
      <label>가하는 힘 F</label>
      <div class="slider-row">
        <input type="range" id="force" min="0" max="100" step="1" value="15">
        <span class="slider-val" id="force-val">15 N</span>
      </div>
    </div>

    <div>
      <label>정지마찰계수 μ<sub>s</sub></label>
      <div class="slider-row">
        <input type="range" id="mu-s" min="0.1" max="1.0" step="0.05" value="0.50">
        <span class="slider-val" id="mu-s-val">0.50</span>
      </div>
    </div>

    <div>
      <label>운동마찰계수 μ<sub>k</sub></label>
      <div class="slider-row">
        <input type="range" id="mu-k" min="0.1" max="0.8" step="0.05" value="0.30">
        <span class="slider-val" id="mu-k-val">0.30</span>
      </div>
    </div>

    <div class="info-box" id="info">
      <!-- dynamically filled -->
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-toggle">시작</button>
      <button class="btn-secondary" id="btn-reset">초기화</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

const massSlider = document.getElementById('mass');
const forceSlider = document.getElementById('force');
const muSSlider = document.getElementById('mu-s');
const muKSlider = document.getElementById('mu-k');
const info = document.getElementById('info');

let running = false;
let velocity = 0;
let position = 0;  // in meters
let time = 0;
let lastTime = null;
let sliding = false; // has breakaway occurred?

// For the graph: record (F, friction) data points
let graphPoints = [];

const g = 9.8;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
}

function getParams() {
  const M = parseFloat(massSlider.value);
  const F = parseFloat(forceSlider.value);
  const muS = parseFloat(muSSlider.value);
  const muK = parseFloat(muKSlider.value);

  const FN = M * g;
  const fsMax = muS * FN;
  const fk = muK * FN;

  return { M, F, muS, muK, FN, fsMax, fk };
}

function computePhysics(p) {
  let friction, Fnet, accel, state;

  if (!sliding) {
    // Static regime: friction matches applied force up to fsMax
    if (p.F <= p.fsMax) {
      friction = p.F;
      Fnet = 0;
      accel = 0;
      state = '정지';
    } else {
      // Breakaway!
      sliding = true;
      friction = p.fk;
      Fnet = p.F - friction;
      accel = Fnet / p.M;
      state = '미끄러짐';
    }
  } else {
    // Kinetic regime
    if (velocity > 0) {
      friction = p.fk;
      Fnet = p.F - friction;
      accel = Fnet / p.M;
      state = '미끄러짐';
    } else {
      // Block has stopped → return to static friction
      velocity = 0;
      sliding = false;
      if (p.F <= p.fsMax) {
        friction = p.F;
        Fnet = 0;
        accel = 0;
        state = '정지';
      } else {
        // Force still exceeds fsMax → immediate breakaway
        sliding = true;
        friction = p.fk;
        Fnet = p.F - friction;
        accel = Fnet / p.M;
        state = '미끄러짐';
      }
    }
  }

  return { friction, Fnet, accel, state };
}

function updateLabels() {
  document.getElementById('mass-val').textContent = parseFloat(massSlider.value).toFixed(1) + ' kg';
  document.getElementById('force-val').textContent = parseFloat(forceSlider.value) + ' N';
  document.getElementById('mu-s-val').textContent = parseFloat(muSSlider.value).toFixed(2);
  document.getElementById('mu-k-val').textContent = parseFloat(muKSlider.value).toFixed(2);
}

function updateInfo() {
  const p = getParams();
  const phys = computePhysics(p);

  info.innerHTML = `
    <div>수직항력: <span class="val">F<sub>N</sub> = ${p.FN.toFixed(1)} N</span></div>
    <div>최대 정지마찰력: <span class="val">f<sub>s,max</sub> = ${p.fsMax.toFixed(1)} N</span></div>
    <hr style="border:none;border-top:1px solid rgba(139,0,41,0.1);margin:6px 0">
    <div>현재 마찰력: <span class="val">f = ${phys.friction.toFixed(1)} N</span></div>
    <div>알짜힘: <span class="val">F<sub>net</sub> = ${phys.Fnet.toFixed(1)} N</span></div>
    <div>가속도: <span class="val">a = ${phys.accel.toFixed(2)} m/s²</span></div>
    <div>속도: <span class="val">v = ${velocity.toFixed(2)} m/s</span></div>
    <hr style="border:none;border-top:1px solid rgba(139,0,41,0.1);margin:6px 0">
    <div>상태: <span class="val" style="color:${phys.state === '미끄러짐' ? '#e63946' : '#2a9d8f'}">${phys.state}</span></div>
  `;
}

function drawArrow(x, y, dx, dy, color, label, labelSide) {
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 2) return;

  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  // Line
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + dx, y + dy);
  ctx.stroke();

  // Arrowhead
  const angle = Math.atan2(dy, dx);
  const headLen = 10;
  ctx.beginPath();
  ctx.moveTo(x + dx, y + dy);
  ctx.lineTo(x + dx - headLen * Math.cos(angle - 0.4), y + dy - headLen * Math.sin(angle - 0.4));
  ctx.lineTo(x + dx - headLen * Math.cos(angle + 0.4), y + dy - headLen * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();

  // Label
  if (label) {
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lx = x + dx * 0.5;
    const ly = y + dy * 0.5;
    const offset = 16;
    if (labelSide === 'above') {
      ctx.fillText(label, lx, ly - offset);
    } else if (labelSide === 'below') {
      ctx.fillText(label, lx, ly + offset);
    } else if (labelSide === 'left') {
      ctx.textAlign = 'right';
      ctx.fillText(label, lx - offset, ly);
    } else {
      ctx.textAlign = 'left';
      ctx.fillText(label, lx + offset, ly);
    }
  }

  ctx.restore();
}

function drawScene() {
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const p = getParams();
  const phys = computePhysics(p);

  // --- TOP HALF: Block on surface ---
  const topH = h * 0.5;
  const groundY = topH * 0.7;
  const blockW = 60 + p.M * 2; // block width scales with mass
  const blockH = 40 + p.M * 1.5;

  // Block always centered horizontally
  const blockCX = w * 0.5;
  const blockLeft = blockCX - blockW / 2;
  const blockTop = groundY - blockH;

  // Ground surface — scrolls to convey motion
  const scrollOffset = (position * 40) % 12;
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(w, groundY);
  ctx.stroke();

  // Ground texture (hatching) — scrolls with velocity
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  for (let gx = -scrollOffset; gx < w + 12; gx += 12) {
    ctx.beginPath();
    ctx.moveTo(gx, groundY);
    ctx.lineTo(gx - 8, groundY + 8);
    ctx.stroke();
  }

  // Block
  ctx.fillStyle = 'rgba(139, 0, 41, 0.12)';
  ctx.strokeStyle = '#8B0029';
  ctx.lineWidth = 2;
  ctx.fillRect(blockLeft, blockTop, blockW, blockH);
  ctx.strokeRect(blockLeft, blockTop, blockW, blockH);

  // Mass label on block
  ctx.fillStyle = '#8B0029';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('m = ' + p.M.toFixed(1) + ' kg', blockCX, blockTop + blockH / 2);

  // Force arrows - scale: 1 N = 1.2 px
  const arrowScale = 1.2;
  const maxArrowLen = 120;

  // Applied force F (red, pointing right)
  if (p.F > 0) {
    const fLen = Math.min(p.F * arrowScale, maxArrowLen);
    drawArrow(blockLeft - 5, blockTop + blockH / 2, -fLen, 0, 'transparent', '', ''); // dummy: we draw from left side of block pushing right
    // Actually draw the applied force from left side pushing right
    drawArrow(blockLeft - fLen - 5, blockTop + blockH / 2, fLen, 0, '#e63946', 'F = ' + p.F + ' N', 'above');
  }

  // Friction force f (blue, pointing left)
  if (phys.friction > 0) {
    const frLen = Math.min(phys.friction * arrowScale, maxArrowLen);
    drawArrow(blockLeft + blockW + 5, blockTop + blockH / 2, frLen, 0, 'transparent', '', '');
    // Friction opposes motion: points left
    drawArrow(blockLeft + blockW + frLen + 5, blockTop + blockH / 2, -frLen, 0, '#457b9d', 'f = ' + phys.friction.toFixed(1) + ' N', 'above');
  }

  // Normal force FN (green, pointing up)
  const fnLen = Math.min(p.FN * arrowScale * 0.8, maxArrowLen);
  drawArrow(blockCX, blockTop, 0, -fnLen, '#2a9d8f', 'F_N', 'right');

  // Weight mg (green-dark, pointing down)
  const mgLen = fnLen; // same magnitude
  drawArrow(blockCX, groundY, 0, mgLen, '#264653', 'mg', 'right');

  // Velocity vector (orange, pointing right, above-right of block)
  if (velocity > 0.01) {
    const vArrowScale = 3; // pixels per m/s
    const vLen = Math.min(velocity * vArrowScale, maxArrowLen);
    const vArrowY = blockTop - 50;
    drawArrow(blockCX + blockW * 0.3, vArrowY, vLen, 0, '#e76f51', 'v = ' + velocity.toFixed(1) + ' m/s', 'above');
  }

  // Status text
  ctx.fillStyle = phys.state === '미끄러짐' ? '#e63946' : '#2a9d8f';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('상태: ' + phys.state, 12, 24);

  // --- BOTTOM HALF: Friction vs Applied Force Graph ---
  const graphLeft = 70;
  const graphRight = w - 30;
  const graphTop = topH + 30;
  const graphBottom = h - 30;
  const graphW = graphRight - graphLeft;
  const graphH = graphBottom - graphTop;

  // Graph title
  ctx.fillStyle = '#8B0029';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('마찰력 vs 가하는 힘', (graphLeft + graphRight) / 2, topH + 18);

  // Axes
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(graphLeft, graphBottom);
  ctx.lineTo(graphRight, graphBottom);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(graphLeft, graphBottom);
  ctx.lineTo(graphLeft, graphTop);
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#555';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('가하는 힘 F (N)', (graphLeft + graphRight) / 2, h - 8);

  ctx.save();
  ctx.translate(15, (graphTop + graphBottom) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('마찰력 f (N)', 0, 0);
  ctx.restore();

  // Scale: x from 0 to 100 N, y from 0 to max(fsMax * 1.3, 100)
  const xMax = 100;
  const yMax = Math.max(p.fsMax * 1.5, p.fk * 2, 30);

  function toGX(val) { return graphLeft + (val / xMax) * graphW; }
  function toGY(val) { return graphBottom - (val / yMax) * graphH; }

  // X-axis ticks
  ctx.fillStyle = '#888';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  for (let tick = 0; tick <= xMax; tick += 20) {
    const tx = toGX(tick);
    ctx.beginPath();
    ctx.moveTo(tx, graphBottom);
    ctx.lineTo(tx, graphBottom + 4);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillText(tick, tx, graphBottom + 14);
  }

  // Y-axis ticks
  ctx.textAlign = 'right';
  const yStep = yMax > 60 ? 20 : (yMax > 30 ? 10 : 5);
  for (let tick = 0; tick <= yMax; tick += yStep) {
    const ty = toGY(tick);
    ctx.beginPath();
    ctx.moveTo(graphLeft - 4, ty);
    ctx.lineTo(graphLeft, ty);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillText(tick.toFixed(0), graphLeft - 8, ty + 4);
  }

  // Dashed line for fs,max
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = '#e63946';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(graphLeft, toGY(p.fsMax));
  ctx.lineTo(graphRight, toGY(p.fsMax));
  ctx.stroke();

  ctx.fillStyle = '#e63946';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('f_s,max = ' + p.fsMax.toFixed(1), graphRight - 100, toGY(p.fsMax) - 5);

  // Dashed line for fk
  ctx.strokeStyle = '#457b9d';
  ctx.beginPath();
  ctx.moveTo(graphLeft, toGY(p.fk));
  ctx.lineTo(graphRight, toGY(p.fk));
  ctx.stroke();

  ctx.fillStyle = '#457b9d';
  ctx.fillText('f_k = ' + p.fk.toFixed(1), graphRight - 80, toGY(p.fk) - 5);

  ctx.setLineDash([]);

  // Draw the characteristic friction curve
  // Static regime: f = F for F from 0 to fsMax (line along y=x)
  ctx.strokeStyle = '#2a9d8f';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  const fsMaxClamp = Math.min(p.fsMax, xMax);
  ctx.moveTo(toGX(0), toGY(0));
  ctx.lineTo(toGX(fsMaxClamp), toGY(fsMaxClamp));
  ctx.stroke();

  // Vertical drop from fsMax to fk at F = fsMax
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(toGX(fsMaxClamp), toGY(fsMaxClamp));
  ctx.lineTo(toGX(fsMaxClamp), toGY(p.fk));
  ctx.stroke();
  ctx.setLineDash([]);

  // Kinetic regime: f = fk for F > fsMax
  if (fsMaxClamp < xMax) {
    ctx.strokeStyle = '#457b9d';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(toGX(fsMaxClamp), toGY(p.fk));
    ctx.lineTo(toGX(xMax), toGY(p.fk));
    ctx.stroke();
  }

  // Current point on graph
  let currentFriction = phys.friction;
  let dotX = toGX(Math.min(p.F, xMax));
  let dotY = toGY(Math.min(currentFriction, yMax));

  const dotColor = sliding ? '#e63946' : '#2a9d8f';
  ctx.beginPath();
  ctx.arc(dotX, dotY, 6, 0, Math.PI * 2);
  ctx.fillStyle = dotColor;
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Tooltip label next to dot
  const tooltipText = phys.state + ' (f = ' + currentFriction.toFixed(1) + ' N)';
  ctx.font = 'bold 11px sans-serif';
  ctx.fillStyle = dotColor;
  const tooltipX = dotX + 10;
  const tooltipY = dotY - 12;
  // Background for readability
  const tw = ctx.measureText(tooltipText).width + 8;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillRect(tooltipX - 4, tooltipY - 10, tw, 16);
  ctx.fillStyle = dotColor;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(tooltipText, tooltipX, tooltipY);

  // Vertical line from x-axis to current point
  ctx.setLineDash([3, 3]);
  ctx.strokeStyle = 'rgba(139, 0, 41, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(dotX, graphBottom);
  ctx.lineTo(dotX, dotY);
  ctx.stroke();
  ctx.setLineDash([]);
}

function step(timestamp) {
  if (!running) return;
  if (lastTime === null) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  const p = getParams();
  const phys = computePhysics(p);

  // Integrate
  velocity += phys.accel * dt;
  if (velocity < 0) {
    velocity = 0;
    sliding = false;
  }
  position += velocity * dt;
  time += dt;

  drawScene();
  updateInfo();
  requestAnimationFrame(step);
}

// Events
massSlider.addEventListener('input', () => { updateLabels(); updateInfo(); drawScene(); });
forceSlider.addEventListener('input', () => {
  updateLabels();
  // Check breakaway in real-time even when not running
  const p = getParams();
  if (!running) {
    // In static mode, reset sliding state based on force
    if (p.F <= p.fsMax) {
      sliding = false;
      velocity = 0;
    }
  }
  updateInfo();
  drawScene();
});
muSSlider.addEventListener('input', () => {
  updateLabels();
  // Ensure mu_k <= mu_s
  const muS = parseFloat(muSSlider.value);
  const muK = parseFloat(muKSlider.value);
  if (muK > muS) {
    muKSlider.value = muS;
    document.getElementById('mu-k-val').textContent = muS.toFixed(2);
  }
  updateInfo();
  drawScene();
});
muKSlider.addEventListener('input', () => {
  updateLabels();
  // Ensure mu_k <= mu_s
  const muS = parseFloat(muSSlider.value);
  const muK = parseFloat(muKSlider.value);
  if (muK > muS) {
    muKSlider.value = muS;
    document.getElementById('mu-k-val').textContent = muS.toFixed(2);
  }
  updateInfo();
  drawScene();
});

document.getElementById('btn-toggle').addEventListener('click', () => {
  running = !running;
  document.getElementById('btn-toggle').textContent = running ? '일시정지' : '시작';
  if (running) {
    lastTime = null;
    requestAnimationFrame(step);
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  running = false;
  velocity = 0;
  position = 0;
  time = 0;
  sliding = false;
  lastTime = null;
  document.getElementById('btn-toggle').textContent = '시작';
  updateInfo();
  drawScene();
});

window.addEventListener('resize', () => { resize(); drawScene(); });

// Init
resize();
updateLabels();
updateInfo();
drawScene();
</script>
</body>
</html>
