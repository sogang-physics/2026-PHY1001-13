  <text x="568" y="303" text-anchor="middle" font-size="16" fill="#8B0029" font-weight="bold">A₀v₀ = Av</text>

  <line x1="460" y1="355" x2="460" y2="405" stroke="#8B0029" stroke-width="2.5" marker-end="url(#fcArrR)"/>
  <text x="480" y="389" font-size="14" fill="#8B0029">아래로 갈수록 A 감소</text>
