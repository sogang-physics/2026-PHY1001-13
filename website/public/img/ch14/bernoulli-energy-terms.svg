<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 455" font-family="sans-serif">
  <text x="390" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">베르누이 방정식: 같은 유선 위의 에너지 밀도</text>

  <line x1="95" y1="382" x2="705" y2="382" stroke="#6B7280" stroke-width="1"/>
  <line x1="105" y1="112" x2="695" y2="112" stroke="#8B0029" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="390" y="101" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">각 위치에서 세 항의 합은 같다</text>

  <!-- Stacked bar 1: p large, kinetic small, potential moderate -->
  <text x="245" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">점 1: 낮고 넓은 부분</text>
  <rect x="185" y="227" width="120" height="155" fill="#8B0029" opacity="0.78"/>
  <rect x="185" y="182" width="120" height="45" fill="#2563EB" opacity="0.78"/>
  <rect x="185" y="112" width="120" height="70" fill="#6B7280" opacity="0.62"/>
  <text x="245" y="309" text-anchor="middle" font-size="14" fill="white" font-weight="bold">p</text>
  <text x="245" y="211" text-anchor="middle" font-size="13" fill="white" font-weight="bold">½ρv²</text>
  <text x="245" y="153" text-anchor="middle" font-size="13" fill="white" font-weight="bold">ρgy</text>
  <text x="245" y="407" text-anchor="middle" font-size="13" fill="#6B7280">압력항 큼, 운동항 작음</text>

  <!-- Stacked bar 2: pressure drops because kinetic and height terms rise -->
  <text x="535" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563EB">점 2: 높고 좁은 부분</text>
  <rect x="475" y="327" width="120" height="55" fill="#8B0029" opacity="0.78"/>
  <rect x="475" y="207" width="120" height="120" fill="#2563EB" opacity="0.78"/>
  <rect x="475" y="112" width="120" height="95" fill="#6B7280" opacity="0.62"/>
  <text x="535" y="360" text-anchor="middle" font-size="14" fill="white" font-weight="bold">p</text>
  <text x="535" y="274" text-anchor="middle" font-size="13" fill="white" font-weight="bold">½ρv²</text>
  <text x="535" y="164" text-anchor="middle" font-size="13" fill="white" font-weight="bold">ρgy</text>
  <text x="535" y="407" text-anchor="middle" font-size="13" fill="#6B7280">높이항·운동항 증가 → 압력항 감소</text>

  <path d="M 323,247 C 370,205 410,205 457,247" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="464,242 455,253 452,238" fill="#6B7280"/>

  <rect x="92" y="424" width="596" height="24" rx="6" fill="#F3F4F6" stroke="#8B0029" stroke-width="1.2"/>
  <text x="390" y="441" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">p + ½ρv² + ρgy = constant  (J/m³ = Pa)</text>
</svg>
