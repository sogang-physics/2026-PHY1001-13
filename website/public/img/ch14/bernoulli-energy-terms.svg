<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 455" font-family="sans-serif">
  <text x="390" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">베르누이 방정식: 에너지 밀도 관점</text>

  <line x1="90" y1="370" x2="700" y2="370" stroke="#6B7280" stroke-width="1"/>
  <text x="80" y="374" text-anchor="end" font-size="13" fill="#6B7280">0</text>

  <text x="220" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#8B0029">점 1: 넓고 느린 부분</text>
  <rect x="145" y="185" width="55" height="185" fill="#8B0029" opacity="0.75"/>
  <rect x="205" y="290" width="55" height="80" fill="#2563EB" opacity="0.75"/>
  <rect x="265" y="245" width="55" height="125" fill="#6B7280" opacity="0.65"/>
  <text x="172" y="178" text-anchor="middle" font-size="13" fill="#8B0029">p</text>
  <text x="232" y="283" text-anchor="middle" font-size="13" fill="#2563EB">½ρv²</text>
  <text x="292" y="238" text-anchor="middle" font-size="13" fill="#6B7280">ρgy</text>

  <text x="560" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563EB">점 2: 좁고 빠른 부분</text>
  <rect x="485" y="255" width="55" height="115" fill="#8B0029" opacity="0.75"/>
  <rect x="545" y="160" width="55" height="210" fill="#2563EB" opacity="0.75"/>
  <rect x="605" y="245" width="55" height="125" fill="#6B7280" opacity="0.65"/>
  <text x="512" y="248" text-anchor="middle" font-size="13" fill="#8B0029">p</text>
  <text x="572" y="153" text-anchor="middle" font-size="13" fill="#2563EB">½ρv²</text>
  <text x="632" y="238" text-anchor="middle" font-size="13" fill="#6B7280">ρgy</text>

  <line x1="130" y1="120" x2="340" y2="120" stroke="#8B0029" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="470" y1="120" x2="680" y2="120" stroke="#8B0029" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="390" y="124" text-anchor="middle" font-size="14" fill="#8B0029" font-weight="bold">합은 일정</text>
  <line x1="342" y1="120" x2="468" y2="120" stroke="#8B0029" stroke-width="1.5"/>

  <rect x="92" y="392" width="596" height="38" rx="6" fill="#F3F4F6" stroke="#8B0029" stroke-width="1.5"/>
  <text x="390" y="417" text-anchor="middle" font-size="16" fill="#8B0029" font-weight="bold">p + ½ρv² + ρgy = constant  (단위: J/m³ = Pa)</text>

  <text x="220" y="102" text-anchor="middle" font-size="13" fill="#6B7280">압력항 큼, 운동항 작음</text>
  <text x="560" y="102" text-anchor="middle" font-size="13" fill="#6B7280">압력항 작음, 운동항 큼</text>
</svg>
