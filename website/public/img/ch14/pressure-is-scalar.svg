<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="sans-serif">
  <defs>
    <marker id="pisArrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#8B0029">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="pisArrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#2563EB">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <text x="360" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#8B0029">압력은 방향이 아니라 한 점의 스칼라 값</text>

  <rect x="80" y="70" width="560" height="270" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="2"/>
  <rect x="82" y="95" width="556" height="243" fill="#2563EB" opacity="0.18"/>
  <line x1="80" y1="95" x2="640" y2="95" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="610" y="88" text-anchor="end" font-size="14" fill="#2563EB">정지 유체</text>

  <circle cx="360" cy="220" r="8" fill="#8B0029"/>
  <circle cx="360" cy="220" r="58" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>

  <line x1="360" y1="220" x2="360" y2="130" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pisArrR)"/>
  <line x1="360" y1="220" x2="450" y2="220" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pisArrR)"/>
  <line x1="360" y1="220" x2="360" y2="310" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pisArrR)"/>
  <line x1="360" y1="220" x2="270" y2="220" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pisArrR)"/>
  <line x1="360" y1="220" x2="424" y2="156" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pisArrR)"/>
  <line x1="360" y1="220" x2="296" y2="284" stroke="#8B0029" stroke-width="2.5" marker-end="url(#pisArrR)"/>

  <rect x="228" y="118" width="264" height="36" rx="6" fill="white" opacity="0.9" stroke="#8B0029" stroke-width="1"/>
  <text x="360" y="141" text-anchor="middle" font-size="15" fill="#8B0029" font-weight="bold">같은 점에서는 모든 방향의 압력 크기가 같다</text>

  <line x1="545" y1="205" x2="595" y2="205" stroke="#2563EB" stroke-width="2.5" marker-end="url(#pisArrB)"/>
  <line x1="595" y1="235" x2="545" y2="235" stroke="#2563EB" stroke-width="2.5" marker-end="url(#pisArrB)"/>
  <text x="570" y="193" text-anchor="middle" font-size="13" fill="#2563EB">힘은 면에 수직</text>
  <text x="570" y="255" text-anchor="middle" font-size="13" fill="#2563EB">압력값은 스칼라</text>

  <rect x="105" y="358" width="510" height="35" rx="6" fill="#F3F4F6" stroke="#8B0029" stroke-width="1.5"/>
  <text x="360" y="381" text-anchor="middle" font-size="16" fill="#8B0029" font-weight="bold">p = F/A,  단위: Pa = N/m²</text>
</svg>
